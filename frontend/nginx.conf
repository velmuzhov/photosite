# Количество рабочих процессов (auto — автоматически по числу ядер CPU)
worker_processes auto;

# Настройки кэширования открытых файлов
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    # Использование наиболее эффективного механизма обработки соединений
    use epoll;  # для Linux
    multi_accept on;
}

http {
    client_max_body_size 100M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Настройки логирования
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Редирект с HTTP на HTTPS для всех поддоменов
    server {
        listen 80;
        server_name velmuzhov.ru www.velmuzhov.ru;

        # Редирект всех HTTP‑запросов на HTTPS
        return 301 https://velmuzhov.ru$request_uri;
    }

    # Основной сервер с HTTPS
    server {
        listen 443 ssl http2;
        server_name velmuzhov.ru www.velmuzhov.ru;

        # Пути к SSL‑сертификатам (настройте после получения сертификатов)
        ssl_certificate /etc/ssl/certs/velmuzhov.ru.crt;
        ssl_certificate_key /etc/ssl/certs/velmuzhov.ru.key;

        # Безопасность: настройки SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Отдача статических файлов фронтенда (собранный React)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Заголовки безопасности для фронтенда
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
        }

        # Проксирование API‑запросов на бекенд FastAPI (порт 8000 внутри контейнера)
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Передача заголовков от клиента на бекенд
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Таймауты для проксирования
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Отдача статических файлов бекенда (изображения и т. д.)
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable, max-age=2592000";
            add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;

            # Безопасность: запрет выполнения скриптов в статической папке
            location ~* \.(php|pl|py|js|sh|lua)$ {
                deny all;
            }
        }

        # Запрет доступа к скрытым файлам
        location ~ /\.ht {
            deny all;
        }
    }
}