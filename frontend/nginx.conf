worker_processes auto;
worker_rlimit_nofile 65535;

# Скрываем версию Nginx

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    server_tokens off;
    client_max_body_size 100M;
    charset utf-8;

    # Лимит на количество соединений с одного IP
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    # Лимит запросов в секунду с одного IP (с возможностью всплесков)
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Настройки логирования
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Основные настройки сервера
    server {
        listen 80;
        server_name velmuzhov.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name velmuzhov.ru;

        ssl_certificate /etc/letsencrypt/live/velmuzhov.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velmuzhov.ru/privkey.pem;

        # Применяем лимиты ко всем location (можно переопределить в отдельных блоках)
        limit_conn conn_limit_per_ip 20;  # Максимум 20 одновременных соединений с одного IP
        limit_req zone=req_limit_per_ip burst=20 nodelay;  # До 10 запросов/сек, до 20 всплесков без задержки

        # Проксирование API‑запросов на бекенд FastAPI (порт 8000 внутри контейнера)
        location /api/ {
            proxy_pass https://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;


            # Увеличиваем лимиты для API (если нужно)
            limit_conn conn_limit_per_ip 50;
            limit_req zone=req_limit_per_ip burst=30 nodelay;

            # CORS
            add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PATCH" always;
            add_header Access-Control-Allow-Credentials "true" always;

            # Preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PATCH" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }
        }

        # Отдача статических файлов бекенда (изображения и т. д.)
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            # Для статического контента снижаем лимиты
            limit_conn conn_limit_per_ip 50;
            limit_req zone=req_limit_per_ip burst=30 nodelay;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Базовые лимиты для фронтенда
            limit_conn conn_limit_per_ip 15;
            limit_req zone=req_limit_per_ip burst=10 nodelay;
        }

        # Защита от сканирования директорий
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Защита от известных вредоносных User-Agent
        if ($http_user_agent ~* (wget|nikto|sqlmap|nmap|masscan)) {
            return 403;
        }
    }
}
