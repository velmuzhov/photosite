worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Таймауты для защиты от slowloris‑атак (должны быть внутри http)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    send_timeout 10s;

    # Защита от DDoS: лимиты соединений и запросов
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=20r/s;

    client_max_body_size 100M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Настройки логирования
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Редирект с HTTP на HTTPS для всех поддоменов
    server {
        listen 80;
        server_name velmuzhov.ru www.velmuzhov.ru;

        # Редирект всех HTTP‑запросов на HTTPS
        return 301 https://$host$request_uri;
    }

    # Основной сервер с HTTPS
    server {
        listen 443 ssl http2;
        server_name velmuzhov.ru www.velmuzhov.ru;

        # Пути к SSL‑сертификатам
        ssl_certificate /etc/letsencrypt/live/velmuzhov.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velmuzhov.ru/privkey.pem;

        # Безопасность: настройки SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Применяем лимит соединений с одного IP (макс. 20 соединений)
        limit_conn conn_limit_per_ip 20;

        # Фронтенд: умеренные лимиты запросов (20 запросов/сек, burst до 30)
        location / {
            limit_req zone=web_limit burst=30 nodelay;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Заголовки безопасности для фронтенда
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
        }

        # API: жёсткие лимиты (5 запросов/сек, burst до 10)
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Передача заголовков от клиента на бекенд
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Таймауты для проксирования
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Отдача статических файлов бекенда (изображения и т. д.)
        location /static/ {
            alias /app/static/;
            expires 5d;
            add_header Cache-Control "public, immutable, max-age=2592000";
            add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;

            # Безопасность: запрет выполнения скриптов в статической папке
            location ~* \.(php|pl|py|js|sh|lua)$ {
                deny all;
            }
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Запрет доступа к скрытым файлам
        location ~ /\.ht {
            deny all;
        }

        # Блокировка известных вредоносных User‑Agent
        if ($http_user_agent ~* (wget|curl|python-requests|masscan|nikto|sqlmap|nmap|nessus)) {
            return 403;
        }
    }
}
