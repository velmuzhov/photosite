worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}


http {
    client_max_body_size 100M;
    charset utf-8;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Настройки логирования
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Основные настройки сервера
    server {
        listen 80;
        server_name velmuzhov.ru;

        location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name velmuzhov.ru;

        ssl_certificate /etc/letsencrypt/live/velmuzhov.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/velmuzhov.ru/privkey.pem;

        # Отдача статических файлов фронтенда (собранный React)

        # Проксирование API‑запросов на бекенд FastAPI (порт 8000 внутри контейнера)
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS
            add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Credentials "true" always;

            # Preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "https://velmuzhov.ru" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "*" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }
          
        }

        # Отдача статических файлов бекенда (изображения и т. д.)
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
